services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campusdesk
      POSTGRES_PASSWORD: campusdesk
      POSTGRES_DB: campusdesk
    ports:
      - "5432:5432"
    volumes:
      - campusdesk_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusdesk -d campusdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://campusdesk:campusdesk@postgres:5432/campusdesk?sslmode=disable
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  campusdesk_pg:
